<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPasakay — Route Drawer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; }
  #map { flex: 1; }
  #sidebar { width: 420px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid #333; }
  .sidebar-header h1 { font-size: 16px; margin-bottom: 4px; color: #fff; }
  .sidebar-header p { font-size: 12px; color: #888; }
  .controls { padding: 12px 16px; border-bottom: 1px solid #333; display: flex; flex-wrap: wrap; gap: 8px; }
  .controls button {
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    border: 1px solid #444; background: #2a2a4a; color: #e0e0e0;
  }
  .controls button:hover { background: #3a3a5a; }
  .controls button.active { background: #16a34a; border-color: #16a34a; color: #fff; }
  .controls button.danger { background: #dc2626; border-color: #dc2626; color: #fff; }
  .route-tabs { display: flex; border-bottom: 1px solid #333; }
  .route-tabs button {
    flex: 1; padding: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
    border: none; background: transparent; color: #888; border-bottom: 2px solid transparent;
  }
  .route-tabs button.active { color: #fff; }
  .route-tabs button[data-route="south"].active  { color: #22c55e; border-bottom-color: #22c55e; }
  .route-tabs button[data-route="north"].active  { color: #3b82f6; border-bottom-color: #3b82f6; }
  .route-tabs button[data-route="cebuCity"].active { color: #f97316; border-bottom-color: #f97316; }

  /* ── Input mode tabs ─────────────────────────────────────────── */
  .input-mode-tabs { display: flex; border-bottom: 1px solid #333; background: #12122a; }
  .input-mode-tabs button {
    flex: 1; padding: 7px; font-size: 11px; font-weight: 600; cursor: pointer;
    border: none; background: transparent; color: #666; border-bottom: 2px solid transparent;
    transition: color .15s;
  }
  .input-mode-tabs button.active { color: #fff; border-bottom-color: #a78bfa; background: #1e1e3a; }
  .input-mode-tabs button:hover:not(.active) { color: #ccc; background: #1a1a30; }

  /* ── Coord input panel ───────────────────────────────────────── */
  #coordPanel { border-bottom: 1px solid #333; background: #12122a; }
  .coord-section { padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; }
  .coord-section label { font-size: 11px; color: #888; }

  /* Single coord row */
  .single-coord-row { display: flex; gap: 6px; align-items: center; }
  .single-coord-row input {
    flex: 1; padding: 6px 8px; border-radius: 6px; font-size: 11px; font-family: monospace;
    background: #1e1e3a; border: 1px solid #3a3a5a; color: #e0e0e0; outline: none;
  }
  .single-coord-row input:focus { border-color: #a78bfa; }
  .single-coord-row input::placeholder { color: #555; }
  .single-coord-row button {
    padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: none; background: #a78bfa; color: #fff; white-space: nowrap;
  }
  .single-coord-row button:hover { background: #9061f9; }

  /* Bulk textarea */
  .bulk-textarea {
    width: 100%; height: 90px; background: #0d0d1a; color: #a78bfa; border: 1px solid #3a3a5a;
    border-radius: 6px; padding: 8px; font-family: monospace; font-size: 10px; resize: vertical;
    outline: none;
  }
  .bulk-textarea:focus { border-color: #a78bfa; }
  .bulk-actions { display: flex; gap: 6px; }
  .bulk-actions button {
    flex: 1; padding: 6px; border-radius: 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: none;
  }
  .btn-bulk-add   { background: #a78bfa; color: #fff; }
  .btn-bulk-add:hover   { background: #9061f9; }
  .btn-bulk-clear { background: #2a2a4a; color: #ccc; border: 1px solid #444; }
  .btn-bulk-clear:hover { background: #3a3a5a; }

  .coord-hint { font-size: 10px; color: #555; font-family: monospace; }
  .coord-error { font-size: 10px; color: #ef4444; min-height: 14px; }

  /* ── Waypoints list ──────────────────────────────────────────── */
  .waypoints-list { flex: 1; overflow-y: auto; padding: 8px 16px; }
  .waypoint-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin-bottom: 4px;
    background: #2a2a4a; border-radius: 6px; font-size: 11px;
  }
  .waypoint-item .idx { min-width: 24px; font-weight: 700; color: #888; }
  .waypoint-item .coords { flex: 1; font-family: monospace; font-size: 10px; }
  .waypoint-item .del { cursor: pointer; color: #888; padding: 2px 6px; border-radius: 4px; }
  .waypoint-item .del:hover { color: #ef4444; background: #3a3a5a; }

  /* ── Output section ──────────────────────────────────────────── */
  .output-section { border-top: 1px solid #333; padding: 12px 16px; }
  .output-section h3 { font-size: 12px; color: #888; margin-bottom: 8px; }
  .output-section textarea {
    width: 100%; height: 130px; background: #0d0d1a; color: #4ade80; border: 1px solid #333;
    border-radius: 6px; padding: 8px; font-family: monospace; font-size: 10px; resize: vertical;
  }
  .output-section .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .output-section button {
    flex: 1; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: none;
  }
  .btn-copy   { background: #16a34a; color: #fff; }
  .btn-copy:hover   { background: #15803d; }
  .btn-export { background: #3b82f6; color: #fff; }
  .btn-export:hover { background: #2563eb; }

  .status-bar { padding: 8px 16px; border-top: 1px solid #333; font-size: 11px; color: #888; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #16a34a; color: #fff; padding: 8px 20px; border-radius: 8px;
    font-size: 13px; display: none; z-index: 9999;
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <div class="sidebar-header">
    <h1>UPasakay Route Drawer</h1>
    <p>Click the map or enter coordinates to add waypoints. Path snaps to roads automatically.</p>
  </div>

  <!-- Route tabs -->
  <div class="route-tabs">
    <button data-route="south"    class="active" onclick="switchRoute('south')">South</button>
    <button data-route="north"    onclick="switchRoute('north')">North</button>
    <button data-route="cebuCity" onclick="switchRoute('cebuCity')">Cebu City</button>
  </div>

  <!-- Input mode tabs -->
  <div class="input-mode-tabs">
    <button id="modeMapBtn"   class="active" onclick="setInputMode('map')">Click Map</button>
    <button id="modeSingleBtn"             onclick="setInputMode('single')">Single Coord</button>
    <button id="modeBulkBtn"               onclick="setInputMode('bulk')">Paste / Bulk</button>
    <button id="modeEditBtn"               onclick="setInputMode('edit')">Edit Path</button>
  </div>

  <!-- Coord input panel (hidden when mode = map) -->
  <div id="coordPanel" style="display:none;">

    <!-- Single coord sub-panel -->
    <div id="singlePanel" class="coord-section">
      <label>Enter a coordinate to add as a waypoint</label>
      <div class="single-coord-row">
        <input id="latInput" type="text" placeholder="Latitude  e.g. 10.3701320" />
        <input id="lngInput" type="text" placeholder="Longitude  e.g. 123.9192870" />
        <button onclick="addSingleCoord()">Add</button>
      </div>
      <span class="coord-hint">Or paste as one field: "lat, lng"</span>
      <div class="coord-error" id="singleError"></div>
    </div>

    <!-- Bulk sub-panel -->
    <div id="bulkPanel" class="coord-section" style="display:none;">
      <label>Paste an array or list of coordinates</label>
      <textarea class="bulk-textarea" id="bulkInput" placeholder="Accepted formats:
[10.3701320, 123.9192870],
[10.3701500, 123.9192690],
...
or just:
10.3701320, 123.9192870
10.3701500, 123.9192690"></textarea>
      <div class="bulk-actions">
        <button class="btn-bulk-add"   onclick="addBulkCoords()">▶ Add All Points</button>
        <button class="btn-bulk-clear" onclick="document.getElementById('bulkInput').value=''">Clear</button>
      </div>
      <div class="coord-error" id="bulkError"></div>
    </div>

    <!-- Edit Path sub-panel -->
    <div id="editPanel" class="coord-section" style="display:none;">
      <label>Paste a path array to load and edit</label>
      <label style="font-size:11px;color:#aaa;display:flex;align-items:center;gap:8px;">
        <input id="editRawCheckbox" type="checkbox" onchange="editPasteAsPath = this.checked" /> Paste as raw path (use these coords as vertices, not stops)
      </label>
      <textarea class="bulk-textarea" id="editInput" placeholder="Paste a path array:
[
  [10.3701320, 123.9192870],
  [10.3701500, 123.9192690],
  [10.3702000, 123.9193000]
]"></textarea>
      <div class="bulk-actions">
        <button class="btn-bulk-add"   onclick="loadEditPath()">▶ Load Path</button>
        <button class="btn-bulk-clear" onclick="document.getElementById('editInput').value=''">Clear</button>
      </div>
      <div class="coord-error" id="editError"></div>
    </div>

  </div>

  <!-- Controls -->
  <div class="controls">
    <button id="btnDraw" class="active" onclick="toggleDraw()">Drawing ON</button>
    <button onclick="reverseRoute()">⟲ Reverse</button>
    <button onclick="undoLast()">↩ Undo</button>
    <button class="danger" onclick="clearRoute()">✕ Clear Route</button>
  </div>

  <div class="waypoints-list" id="waypointsList"></div>

  <div class="output-section">
    <h3>Generated Code (pre-computed road geometry)</h3>
    <textarea id="output" readonly placeholder="Draw a route to see coordinates here..."></textarea>
    <div class="btn-row">
      <button class="btn-copy"   onclick="copyOutput()">Copy This Route</button>
      <button class="btn-export" onclick="exportAll()">Export All Routes</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar">Ready — click on the map or enter coordinates to add waypoints</div>
</div>

<div class="toast" id="toast"></div>

<script>
const routeColors = { south: '#22c55e', north: '#3b82f6', cebuCity: '#f97316' };
let currentRoute = 'south';
let drawingEnabled = true;
let inputMode = 'map'; // 'map' | 'single' | 'bulk' | 'edit'
let editPasteAsPath = false; // when true, pasted arrays are treated as raw path vertices

const routeData = {
  south:    { waypoints: [], markers: [], roadPath: [], polyline: null, vertexMarkers: [] },
  north:    { waypoints: [], markers: [], roadPath: [], polyline: null, vertexMarkers: [] },
  cebuCity: { waypoints: [], markers: [], roadPath: [], polyline: null, vertexMarkers: [] },
};

const map = L.map('map').setView([10.3000, 123.8800], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 20, subdomains: 'abcd',
  attribution: '© <a href="https://carto.com/">CARTO</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>'
}).addTo(map);

// ── Input mode ────────────────────────────────────────────────────────────
function setInputMode(mode) {
  inputMode = mode;
  document.getElementById('modeMapBtn').classList.toggle('active', mode === 'map');
  document.getElementById('modeSingleBtn').classList.toggle('active', mode === 'single');
  document.getElementById('modeBulkBtn').classList.toggle('active', mode === 'bulk');
  document.getElementById('modeEditBtn').classList.toggle('active', mode === 'edit');

  const panel = document.getElementById('coordPanel');
  panel.style.display = mode === 'map' ? 'none' : 'block';
  document.getElementById('singlePanel').style.display = mode === 'single' ? 'flex' : 'none';
  document.getElementById('bulkPanel').style.display   = mode === 'bulk'   ? 'flex' : 'none';
  document.getElementById('editPanel').style.display   = mode === 'edit'   ? 'flex' : 'none';

  // Keep drawing toggle in sync: only enable map click when in map mode
  drawingEnabled = mode === 'map';
  const btn = document.getElementById('btnDraw');
  btn.textContent = drawingEnabled ? '✏️ Drawing ON' : '✏️ Drawing OFF';
  btn.classList.toggle('active', drawingEnabled);
}

// ── Parse a lat/lng pair from various string formats ──────────────────────
function parseLatLng(str) {
  // Strip brackets, parentheses, trailing commas
  const clean = str.replace(/[\[\]()\,]/g, ' ').trim();
  const parts = clean.split(/\s+/).filter(Boolean);
  if (parts.length < 2) return null;
  const lat = parseFloat(parts[0]);
  const lng = parseFloat(parts[1]);
  if (isNaN(lat) || isNaN(lng)) return null;
  if (lat < -90 || lat > 90 || lng < -180 || lng > 180) return null;
  return [lat, lng];
}

// ── Add single coordinate ─────────────────────────────────────────────────
async function addSingleCoord() {
  const latVal = document.getElementById('latInput').value.trim();
  const lngVal = document.getElementById('lngInput').value.trim();
  const errEl  = document.getElementById('singleError');
  errEl.textContent = '';

  let pair;
  // If user pasted "lat, lng" into the lat field only
  if (latVal.includes(',') && !lngVal) {
    pair = parseLatLng(latVal);
  } else {
    pair = parseLatLng(latVal + ' ' + lngVal);
  }

  if (!pair) {
    errEl.textContent = '⚠ Invalid coordinates. Check values and try again.';
    return;
  }

  // If in edit mode and treating paste as raw path, insert as a vertex
  if (inputMode === 'edit' && editPasteAsPath) {
    await insertVertexAt({ lat: pair[0], lng: pair[1] });
  } else {
    await addWaypoint(pair[0], pair[1]);
  }

  // Clear inputs
  document.getElementById('latInput').value = '';
  document.getElementById('lngInput').value = '';
  document.getElementById('latInput').focus();
}

// Allow pressing Enter on the lng field to submit
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('lngInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addSingleCoord();
  });
  document.getElementById('latInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addSingleCoord();
  });
});

// ── Add bulk coordinates ──────────────────────────────────────────────────
async function addBulkCoords() {
  const raw   = document.getElementById('bulkInput').value;
  const errEl = document.getElementById('bulkError');
  errEl.textContent = '';

  // Split by lines or by "],["
  const lines = raw.split(/\n|(?<=\])\s*,\s*(?=\[)/).map(l => l.trim()).filter(Boolean);
  const pairs = [];
  const bad   = [];

  lines.forEach((line, i) => {
    const p = parseLatLng(line);
    if (p) pairs.push(p);
    else if (line.length > 1) bad.push(i + 1); // skip blank lines silently
  });

  if (pairs.length === 0) {
    errEl.textContent = '⚠ No valid coordinates found.';
    return;
  }
  if (bad.length) {
    errEl.textContent = '⚠ Skipped ' + bad.length + ' invalid line(s): ' + bad.slice(0, 6).join(', ') + (bad.length > 6 ? '…' : '');
  }

  setStatus('Adding ' + pairs.length + ' waypoints from bulk input…');

  // Add markers instantly, then build road once
  const rd = routeData[currentRoute];
  for (const [lat, lng] of pairs) {
    const idx = rd.waypoints.length;
    const marker = L.circleMarker([lat, lng], {
      radius: 7, color: '#fff', fillColor: routeColors[currentRoute], fillOpacity: 1, weight: 2,
    }).addTo(map).bindTooltip('#' + (idx + 1), { permanent: true, direction: 'top', offset: [0, -10] });
    rd.waypoints.push([lat, lng]);
    rd.markers.push(marker);
  }

  await rebuildRoad(currentRoute);
  updateUI();

  // Fit map to new points
  if (rd.polyline) map.fitBounds(rd.polyline.getBounds(), { padding: [40, 40] });

  document.getElementById('bulkInput').value = '';
}

// ── Click to add waypoint ─────────────────────────────────────────────────
map.on('click', async (e) => {
  // If we're in edit mode and editing a raw path, insert a vertex
  if (inputMode === 'edit') {
    await insertVertexAt(e.latlng);
    return;
  }

  if (!drawingEnabled) return;
  const { lat, lng } = e.latlng;
  await addWaypoint(lat, lng);
});

async function addWaypoint(lat, lng) {
  const rd  = routeData[currentRoute];
  const idx = rd.waypoints.length;
  const marker = L.circleMarker([lat, lng], {
    radius: 7, color: '#fff', fillColor: routeColors[currentRoute], fillOpacity: 1, weight: 2,
  }).addTo(map).bindTooltip('#' + (idx + 1), { permanent: true, direction: 'top', offset: [0, -10] });

  rd.waypoints.push([lat, lng]);
  rd.markers.push(marker);

  setStatus('Added waypoint #' + rd.waypoints.length + ' — computing road path…');
  await rebuildRoad(currentRoute);
  updateUI();
}

// ── Build road path segment-by-segment ───────────────────────────────────
async function rebuildRoad(routeKey) {
  const rd = routeData[routeKey];
  if (rd.waypoints.length < 2) {
    rd.roadPath = rd.waypoints.length === 1 ? [rd.waypoints[0]] : [];
    if (rd.polyline) { rd.polyline.remove(); rd.polyline = null; }
    return;
  }

  setStatus('Computing road path for ' + rd.waypoints.length + ' waypoints…');
  const fullPath = [];

  for (let i = 0; i < rd.waypoints.length - 1; i++) {
    const from = rd.waypoints[i], to = rd.waypoints[i + 1];
    try {
      const coords = from[1] + ',' + from[0] + ';' + to[1] + ',' + to[0];
      const url = 'https://router.project-osrm.org/route/v1/driving/' + coords + '?overview=full&geometries=geojson';
      const res  = await fetch(url);
      const data = await res.json();
      if (data.routes && data.routes.length) {
        const seg = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        fullPath.push(...(i === 0 ? seg : seg.slice(1)));
      } else {
        if (i === 0) fullPath.push(from);
        fullPath.push(to);
      }
    } catch {
      if (i === 0) fullPath.push(from);
      fullPath.push(to);
    }
  }

  rd.roadPath = fullPath;
  if (rd.polyline) rd.polyline.remove();
  rd.polyline = L.polyline(fullPath, {
    color: routeColors[routeKey], weight: 5, opacity: 0.7, smoothFactor: 1,
  }).addTo(map);

  setStatus('Route "' + routeKey + '" — ' + fullPath.length + ' road points from ' + rd.waypoints.length + ' waypoints');
}

// ── UI helpers ────────────────────────────────────────────────────────────
function updateUI() {
  const rd = routeData[currentRoute];
  // Show waypoints OR raw path vertices when editing a raw path
  const listEl = document.getElementById('waypointsList');
  if (rd.waypoints && rd.waypoints.length) {
    listEl.innerHTML = rd.waypoints.map((wp, i) =>
      '<div class="waypoint-item">' +
      '<span class="idx">#' + (i+1) + '</span>' +
      '<span class="coords">[' + wp[0].toFixed(7) + ', ' + wp[1].toFixed(7) + ']</span>' +
      '<span class="del" onclick="removeWaypoint(' + i + ')">✕</span></div>'
    ).join('');
  } else if (rd.roadPath && rd.roadPath.length) {
    listEl.innerHTML = rd.roadPath.map((wp, i) =>
      '<div class="waypoint-item">' +
      '<span class="idx">v' + (i+1) + '</span>' +
      '<span class="coords">[' + wp[0].toFixed(7) + ', ' + wp[1].toFixed(7) + ']</span>' +
      '<span class="del" onclick="removeVertex(\'' + currentRoute + '\',' + i + ')">✕</span></div>'
    ).join('');
  } else {
    listEl.innerHTML = '';
  }

  const output = document.getElementById('output');
  if (rd.roadPath.length === 0) { output.value = '// Draw a route first…'; return; }

  const pathLines = rd.roadPath.map(p => '    [' + p[0].toFixed(7) + ', ' + p[1].toFixed(7) + '],').join('\n');
  output.value =
    '// Pre-computed road path for "' + currentRoute + '" (' + rd.roadPath.length + ' points)\n' +
    'path: [\n' + pathLines + '\n],';
}

function switchRoute(routeKey) {
  currentRoute = routeKey;
  document.querySelectorAll('.route-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector('.route-tabs button[data-route="' + routeKey + '"]').classList.add('active');
  updateUI();
}

function toggleDraw() {
  drawingEnabled = !drawingEnabled;
  const btn = document.getElementById('btnDraw');
  btn.textContent = drawingEnabled ? '✏️ Drawing ON' : '✏️ Drawing OFF';
  btn.classList.toggle('active', drawingEnabled);
}

async function undoLast() {
  const rd = routeData[currentRoute];
  // If editing raw path and there are vertices, remove last vertex
  if (inputMode === 'edit' && rd.roadPath && rd.roadPath.length) {
    rd.roadPath.pop();
    if (rd.vertexMarkers && rd.vertexMarkers.length) {
      const m = rd.vertexMarkers.pop(); if (m) m.remove();
      rd.vertexMarkers.forEach((mm, i) => mm._vertexIndex = i);
    }
    if (rd.polyline) rd.polyline.setLatLngs(rd.roadPath);
    updateUI();
    return;
  }

  if (!rd.waypoints.length) return;
  rd.markers.pop().remove();
  rd.waypoints.pop();
  rd.markers.forEach((m, i) => m.setTooltipContent('#' + (i+1)));
  await rebuildRoad(currentRoute);
  updateUI();
}

async function removeWaypoint(idx) {
  const rd = routeData[currentRoute];
  rd.markers.splice(idx, 1)[0].remove();
  rd.waypoints.splice(idx, 1);
  rd.markers.forEach((m, i) => m.setTooltipContent('#' + (i+1)));
  await rebuildRoad(currentRoute);
  updateUI();
}

// ── Load path from edit mode ──────────────────────────────────────────────
async function loadEditPath() {
  const raw   = document.getElementById('editInput').value;
  const errEl = document.getElementById('editError');
  errEl.textContent = '';

  // Try to parse as JSON array first
  let pairs = [];
  try {
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      pairs = parsed.map(p => {
        if (Array.isArray(p) && p.length >= 2) {
          const lat = parseFloat(p[0]);
          const lng = parseFloat(p[1]);
          if (!isNaN(lat) && !isNaN(lng) && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
            return [lat, lng];
          }
        }
        return null;
      }).filter(p => p !== null);
    }
  } catch (e) {
    // Not valid JSON, try line-by-line parsing
    const lines = raw.split(/\n|(?<=\])\s*,\s*(?=\[)/).map(l => l.trim()).filter(Boolean);
    const bad = [];
    lines.forEach((line, i) => {
      const p = parseLatLng(line);
      if (p) pairs.push(p);
      else if (line.length > 1) bad.push(i + 1);
    });
    if (bad.length && pairs.length === 0) {
      errEl.textContent = '⚠ Could not parse coordinates. Check format.';
      return;
    }
  }

  if (pairs.length === 0) {
    errEl.textContent = '⚠ No valid coordinates found.';
    return;
  }

  const rd = routeData[currentRoute];
  // If user wants to paste as a raw path (vertices) — create editable path
  if (editPasteAsPath) {
    await clearRoute();
    rd.roadPath = pairs.slice();
    drawRawPath(currentRoute);
    updateUI();
    if (rd.polyline) map.fitBounds(rd.polyline.getBounds(), { padding: [40, 40] });
    document.getElementById('editInput').value = '';
    return;
  }

  // Otherwise treat as waypoints (legacy behavior)
  await clearRoute();
  setStatus('Loading ' + pairs.length + ' waypoints from path…');

  for (const [lat, lng] of pairs) {
    const idx = rd.waypoints.length;
    const marker = L.circleMarker([lat, lng], {
      radius: 7, color: '#fff', fillColor: routeColors[currentRoute], fillOpacity: 1, weight: 2,
    }).addTo(map).bindTooltip('#' + (idx + 1), { permanent: true, direction: 'top', offset: [0, -10] });
    rd.waypoints.push([lat, lng]);
    rd.markers.push(marker);
  }

  await rebuildRoad(currentRoute);
  updateUI();

  if (rd.polyline) map.fitBounds(rd.polyline.getBounds(), { padding: [40, 40] });
  document.getElementById('editInput').value = '';
}

// ── Reverse route ────────────────────────────────────────────────────────
async function reverseRoute() {
  const rd = routeData[currentRoute];
  if (rd.waypoints.length < 2) {
    setStatus('Need at least 2 waypoints to reverse');
    return;
  }

  // Reverse both waypoints and markers
  rd.waypoints.reverse();
  rd.markers.reverse();

  // Update tooltip labels
  rd.markers.forEach((m, i) => m.setTooltipContent('#' + (i + 1)));

  setStatus('Reversed "' + currentRoute + '" route');
  await rebuildRoad(currentRoute);
  updateUI();
}

async function clearRoute() {
  const rd = routeData[currentRoute];
  // remove waypoint markers
  if (rd.markers && rd.markers.length) { rd.markers.forEach(m => m.remove()); rd.markers.length = 0; }
  // remove vertex markers if any
  if (rd.vertexMarkers && rd.vertexMarkers.length) { rd.vertexMarkers.forEach(m => m.remove()); rd.vertexMarkers.length = 0; }
  rd.waypoints.length = 0;
  rd.roadPath = [];
  if (rd.polyline) { rd.polyline.remove(); rd.polyline = null; }
  updateUI();
  setStatus('Cleared "' + currentRoute + '" route');
}

// ── Raw path editing helpers ───────────────────────────────────────────
function drawRawPath(routeKey) {
  const rd = routeData[routeKey];
  if (rd.polyline) { rd.polyline.remove(); rd.polyline = null; }
  if (rd.vertexMarkers && rd.vertexMarkers.length) { rd.vertexMarkers.forEach(m => m.remove()); rd.vertexMarkers = []; }
  if (!rd.roadPath || rd.roadPath.length === 0) return;
  rd.polyline = L.polyline(rd.roadPath, { color: routeColors[routeKey], weight: 5, opacity: 0.7, smoothFactor: 1 }).addTo(map);
  rd.vertexMarkers = [];
  for (let i = 0; i < rd.roadPath.length; i++) {
    const latlng = rd.roadPath[i];
    const m = createVertexMarker(routeKey, i, latlng);
    rd.vertexMarkers.push(m);
  }
}

function createVertexMarker(routeKey, idx, latlng) {
  const rd = routeData[routeKey];
  const color = routeColors[routeKey];
  const icon = L.divIcon({ className: 'vertex-marker', html: '<div style="width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid ' + color + ';box-shadow:0 0 2px rgba(0,0,0,0.6)"></div>', iconSize: [14,14], iconAnchor: [7,7] });
  const marker = L.marker(latlng, { icon, draggable: true, title: '#' + (idx+1) }).addTo(map);
  marker._vertexIndex = idx;
  marker.on('drag', (e) => {
    const p = e.target.getLatLng();
    rd.roadPath[marker._vertexIndex] = [p.lat, p.lng];
    if (rd.polyline) rd.polyline.setLatLngs(rd.roadPath);
  });
  marker.on('dragend', () => { updateUI(); setStatus('Moved vertex #' + (marker._vertexIndex+1)); });
  marker.on('contextmenu', () => { removeVertex(routeKey, marker._vertexIndex); });
  return marker;
}

function removeVertex(routeKey, idx) {
  const rd = routeData[routeKey];
  if (!rd.roadPath || idx < 0 || idx >= rd.roadPath.length) return;
  if (rd.vertexMarkers && rd.vertexMarkers[idx]) rd.vertexMarkers[idx].remove();
  rd.roadPath.splice(idx, 1);
  if (rd.vertexMarkers) { rd.vertexMarkers.splice(idx, 1); rd.vertexMarkers.forEach((m, i) => m._vertexIndex = i); }
  if (rd.polyline) rd.polyline.setLatLngs(rd.roadPath);
  updateUI();
  setStatus('Removed vertex #' + (idx+1));
}

async function insertVertexAt(latlng) {
  const rd = routeData[currentRoute];
  if (!rd.roadPath) rd.roadPath = [];
  const p = [latlng.lat, latlng.lng];
  if (rd.roadPath.length < 2) {
    rd.roadPath.push(p);
    drawRawPath(currentRoute);
    updateUI();
    return;
  }
  let bestIdx = rd.roadPath.length - 1;
  let bestDist = Infinity;
  for (let i = 0; i < rd.roadPath.length - 1; i++) {
    const a = rd.roadPath[i], b = rd.roadPath[i+1];
    const d = pointToSegmentDistanceSquared(p, a, b);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  rd.roadPath.splice(bestIdx+1, 0, p);
  drawRawPath(currentRoute);
  updateUI();
  setStatus('Inserted vertex at #' + (bestIdx+2));
}

function pointToSegmentDistanceSquared(p, a, b) {
  const x = p[0], y = p[1];
  const x1 = a[0], y1 = a[1];
  const x2 = b[0], y2 = b[1];
  const A = x - x1, B = y - y1, C = x2 - x1, D = y2 - y1;
  const dot = A * C + B * D;
  const len_sq = C * C + D * D;
  let param = len_sq !== 0 ? dot / len_sq : -1;
  let xx, yy;
  if (param < 0) { xx = x1; yy = y1; }
  else if (param > 1) { xx = x2; yy = y2; }
  else { xx = x1 + param * C; yy = y1 + param * D; }
  const dx = x - xx, dy = y - yy; return dx * dx + dy * dy;
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output').value)
    .then(() => showToast('Copied to clipboard!'));
}

function exportAll() {
  let code = '// ── Pre-computed route paths ──────────────────────────────\n';
  code += '// Paste this into LiveMap.vue and Dashboard.vue\n';
  code += '// Replace the existing routeStops + fetchSegmentedRoute with this\n\n';
  code += 'const routePaths: Record<string, { color: string; path: [number, number][] }> = {\n';
  for (const [key, rd] of Object.entries(routeData)) {
    if (!rd.roadPath.length) continue;
    const lines = rd.roadPath.map(p => '        [' + p[0].toFixed(7) + ', ' + p[1].toFixed(7) + '],').join('\n');
    code += '    ' + key + ': {\n        color: \'' + routeColors[key] + '\',\n        path: [\n' + lines + '\n        ],\n    },\n';
  }
  code += '};\n';
  document.getElementById('output').value = code;
  navigator.clipboard.writeText(code).then(() => showToast('All routes exported & copied!'));
}

function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}
</script>

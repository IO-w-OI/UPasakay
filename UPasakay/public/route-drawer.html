<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPasakay — Route Drawer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; }
  #map { flex: 1; }
  #sidebar { width: 400px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid #333; }
  .sidebar-header h1 { font-size: 16px; margin-bottom: 4px; color: #fff; }
  .sidebar-header p { font-size: 12px; color: #888; }
  .controls { padding: 12px 16px; border-bottom: 1px solid #333; display: flex; flex-wrap: wrap; gap: 8px; }
  .controls button {
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    border: 1px solid #444; background: #2a2a4a; color: #e0e0e0;
  }
  .controls button:hover { background: #3a3a5a; }
  .controls button.active { background: #16a34a; border-color: #16a34a; color: #fff; }
  .controls button.danger { background: #dc2626; border-color: #dc2626; color: #fff; }
  .route-tabs { display: flex; border-bottom: 1px solid #333; }
  .route-tabs button {
    flex: 1; padding: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
    border: none; background: transparent; color: #888; border-bottom: 2px solid transparent;
  }
  .route-tabs button.active { color: #fff; }
  .route-tabs button[data-route="south"].active { color: #22c55e; border-bottom-color: #22c55e; }
  .route-tabs button[data-route="north"].active { color: #3b82f6; border-bottom-color: #3b82f6; }
  .route-tabs button[data-route="cebuCity"].active { color: #f97316; border-bottom-color: #f97316; }
  .waypoints-list { flex: 1; overflow-y: auto; padding: 8px 16px; }
  .waypoint-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin-bottom: 4px;
    background: #2a2a4a; border-radius: 6px; font-size: 11px;
  }
  .waypoint-item .idx { min-width: 24px; font-weight: 700; color: #888; }
  .waypoint-item .coords { flex: 1; font-family: monospace; font-size: 10px; }
  .waypoint-item .del { cursor: pointer; color: #888; padding: 2px 6px; border-radius: 4px; }
  .waypoint-item .del:hover { color: #ef4444; background: #3a3a5a; }
  .output-section { border-top: 1px solid #333; padding: 12px 16px; }
  .output-section h3 { font-size: 12px; color: #888; margin-bottom: 8px; }
  .output-section textarea {
    width: 100%; height: 150px; background: #0d0d1a; color: #4ade80; border: 1px solid #333;
    border-radius: 6px; padding: 8px; font-family: monospace; font-size: 10px; resize: vertical;
  }
  .output-section .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .output-section button {
    flex: 1; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: none;
  }
  .btn-copy { background: #16a34a; color: #fff; }
  .btn-copy:hover { background: #15803d; }
  .btn-export { background: #3b82f6; color: #fff; }
  .btn-export:hover { background: #2563eb; }
  .status-bar { padding: 8px 16px; border-top: 1px solid #333; font-size: 11px; color: #888; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #16a34a; color: #fff; padding: 8px 20px; border-radius: 8px;
    font-size: 13px; display: none; z-index: 9999;
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <div class="sidebar-header">
    <h1>UPasakay Route Drawer</h1>
    <p>Click on the map to add waypoints. The path snaps to roads automatically.<br>
    Export the pre-computed path and paste it into your Vue code.</p>
  </div>

  <div class="route-tabs">
    <button data-route="south" class="active" onclick="switchRoute('south')">South</button>
    <button data-route="north" onclick="switchRoute('north')">North</button>
    <button data-route="cebuCity" onclick="switchRoute('cebuCity')">Cebu City</button>
  </div>

  <div class="controls">
    <button id="btnDraw" class="active" onclick="toggleDraw()"> Drawing ON</button>
    <button onclick="undoLast()"> Undo</button>
    <button class="danger" onclick="clearRoute()">Clear Route</button>
  </div>

  <div class="waypoints-list" id="waypointsList"></div>

  <div class="output-section">
    <h3>Generated Code (pre-computed road geometry)</h3>
    <textarea id="output" readonly placeholder="Draw a route to see coordinates here..."></textarea>
    <div class="btn-row">
      <button class="btn-copy" onclick="copyOutput()">Copy This Route</button>
      <button class="btn-export" onclick="exportAll()">Export All Routes</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar">Ready — click on the map to add waypoints</div>
</div>

<div class="toast" id="toast"></div>

<script>
const routeColors = { south: '#22c55e', north: '#3b82f6', cebuCity: '#f97316' };
let currentRoute = 'south';
let drawingEnabled = true;

const routeData = {
  south:    { waypoints: [], markers: [], roadPath: [], polyline: null },
  north:    { waypoints: [], markers: [], roadPath: [], polyline: null },
  cebuCity: { waypoints: [], markers: [], roadPath: [], polyline: null },
};

const map = L.map('map').setView([10.3000, 123.8800], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 20, subdomains: 'abcd',
  attribution: '© <a href="https://carto.com/">CARTO</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>'
}).addTo(map);

// ── Click to add waypoint ────────────────────────────────────────────────
map.on('click', async (e) => {
  if (!drawingEnabled) return;
  const { lat, lng } = e.latlng;
  const rd = routeData[currentRoute];
  const idx = rd.waypoints.length;

  const marker = L.circleMarker([lat, lng], {
    radius: 7, color: '#fff', fillColor: routeColors[currentRoute], fillOpacity: 1, weight: 2,
  }).addTo(map).bindTooltip('#' + (idx + 1), { permanent: true, direction: 'top', offset: [0, -10] });

  rd.waypoints.push([lat, lng]);
  rd.markers.push(marker);

  setStatus('Added waypoint #' + rd.waypoints.length + ' — computing road path…');
  await rebuildRoad(currentRoute);
  updateUI();
});

// ── Build road path segment-by-segment ───────────────────────────────────
async function rebuildRoad(routeKey) {
  const rd = routeData[routeKey];
  if (rd.waypoints.length < 2) {
    rd.roadPath = rd.waypoints.length === 1 ? [rd.waypoints[0]] : [];
    if (rd.polyline) { rd.polyline.remove(); rd.polyline = null; }
    return;
  }

  setStatus('Computing road path for ' + rd.waypoints.length + ' waypoints…');
  const fullPath = [];

  for (let i = 0; i < rd.waypoints.length - 1; i++) {
    const from = rd.waypoints[i], to = rd.waypoints[i + 1];
    try {
      const coords = from[1] + ',' + from[0] + ';' + to[1] + ',' + to[0];
      const url = 'https://router.project-osrm.org/route/v1/driving/' + coords + '?overview=full&geometries=geojson';
      const res = await fetch(url);
      const data = await res.json();
      if (data.routes && data.routes.length) {
        const seg = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        fullPath.push(...(i === 0 ? seg : seg.slice(1)));
      } else {
        if (i === 0) fullPath.push(from);
        fullPath.push(to);
      }
    } catch {
      if (i === 0) fullPath.push(from);
      fullPath.push(to);
    }
  }

  rd.roadPath = fullPath;
  if (rd.polyline) rd.polyline.remove();
  rd.polyline = L.polyline(fullPath, {
    color: routeColors[routeKey], weight: 5, opacity: 0.7, smoothFactor: 1,
  }).addTo(map);

  setStatus('Route "' + routeKey + '" — ' + fullPath.length + ' road points from ' + rd.waypoints.length + ' waypoints');
}

// ── UI ───────────────────────────────────────────────────────────────────
function updateUI() {
  const rd = routeData[currentRoute];
  document.getElementById('waypointsList').innerHTML = rd.waypoints.map((wp, i) =>
    '<div class="waypoint-item">' +
    '<span class="idx">#' + (i+1) + '</span>' +
    '<span class="coords">[' + wp[0].toFixed(7) + ', ' + wp[1].toFixed(7) + ']</span>' +
    '<span class="del" onclick="removeWaypoint(' + i + ')">✕</span></div>'
  ).join('');

  const output = document.getElementById('output');
  if (rd.roadPath.length === 0) { output.value = '// Draw a route first…'; return; }

  const pathLines = rd.roadPath.map(p => '    [' + p[0].toFixed(7) + ', ' + p[1].toFixed(7) + '],').join('\n');
  output.value =
    '// Pre-computed road path for "' + currentRoute + '" (' + rd.roadPath.length + ' points)\n' +
    'path: [\n' + pathLines + '\n],';
}

function switchRoute(routeKey) {
  currentRoute = routeKey;
  document.querySelectorAll('.route-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector('.route-tabs button[data-route="' + routeKey + '"]').classList.add('active');
  updateUI();
}

function toggleDraw() {
  drawingEnabled = !drawingEnabled;
  const btn = document.getElementById('btnDraw');
  btn.textContent = drawingEnabled ? '✏️ Drawing ON' : '✏️ Drawing OFF';
  btn.classList.toggle('active', drawingEnabled);
}

async function undoLast() {
  const rd = routeData[currentRoute];
  if (!rd.waypoints.length) return;
  rd.markers.pop().remove();
  rd.waypoints.pop();
  rd.markers.forEach((m, i) => m.setTooltipContent('#' + (i+1)));
  await rebuildRoad(currentRoute);
  updateUI();
}

async function removeWaypoint(idx) {
  const rd = routeData[currentRoute];
  rd.markers.splice(idx, 1)[0].remove();
  rd.waypoints.splice(idx, 1);
  rd.markers.forEach((m, i) => m.setTooltipContent('#' + (i+1)));
  await rebuildRoad(currentRoute);
  updateUI();
}

async function clearRoute() {
  const rd = routeData[currentRoute];
  rd.markers.forEach(m => m.remove());
  rd.markers.length = 0;
  rd.waypoints.length = 0;
  rd.roadPath = [];
  if (rd.polyline) { rd.polyline.remove(); rd.polyline = null; }
  updateUI();
  setStatus('Cleared "' + currentRoute + '" route');
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output').value)
    .then(() => showToast('Copied to clipboard!'));
}

function exportAll() {
  let code = '// ── Pre-computed route paths ──────────────────────────────\n';
  code += '// Paste this into LiveMap.vue and Dashboard.vue\n';
  code += '// Replace the existing routeStops + fetchSegmentedRoute with this\n\n';
  code += 'const routePaths: Record<string, { color: string; path: [number, number][] }> = {\n';

  for (const [key, rd] of Object.entries(routeData)) {
    if (!rd.roadPath.length) continue;
    const lines = rd.roadPath.map(p => '        [' + p[0].toFixed(7) + ', ' + p[1].toFixed(7) + '],').join('\n');
    code += '    ' + key + ': {\n        color: \'' + routeColors[key] + '\',\n        path: [\n' + lines + '\n        ],\n    },\n';
  }
  code += '};\n';

  document.getElementById('output').value = code;
  navigator.clipboard.writeText(code).then(() => showToast('All routes exported & copied!'));
}

function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}
</script>
</body>
</html>

name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  assignment-consistency:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./UPasakay

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: upasakay_test
          POSTGRES_USER: upasakay_user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U upasakay_user -d upasakay_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none
          extensions: pdo_pgsql, pgsql

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Configure Test Database
        run: |
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=upasakay_test" >> .env
          echo "DB_USERNAME=upasakay_user" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U upasakay_user -d upasakay_test; do
            sleep 1
          done

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Run Assignment Consistency Tests
        run: |
          php artisan test \
            tests/Unit/DriverAssignmentServiceTest.php \
            tests/Feature/DriverAssignmentApiConsistencyTest.php

  full-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./UPasakay

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: upasakay_test
          POSTGRES_USER: upasakay_user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U upasakay_user -d upasakay_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: xdebug
          extensions: pdo_pgsql, pgsql

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Configure Test Database
        run: |
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=upasakay_test" >> .env
          echo "DB_USERNAME=upasakay_user" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U upasakay_user -d upasakay_test; do
            sleep 1
          done

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Build Assets
        run: npm run build

      - name: Run Full Test Suite
        run: php artisan test
